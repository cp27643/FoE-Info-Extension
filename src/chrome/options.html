<!doctype html>
<html>
  <head>
    <title><%= htmlWebpackPlugin.options.title %> Options</title>
    <script type="module" src="browser-polyfill.js"></script>
  </head>

  <body>
    <div class="container">
      <div class="text-center mb-3">
        <h5><%= htmlWebpackPlugin.options.title %> — Settings</h5>
      </div>
      <div class="button-info mb-3" id="status">
        <button type="button" class="btn btn-primary" id="save">Save</button>
      </div>

      <!-- Tab navigation -->
      <ul class="nav nav-tabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            data-bs-toggle="tab"
            data-bs-target="#tab-panels"
            type="button"
            role="tab"
          >
            Panels
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tab-gb"
            type="button"
            role="tab"
          >
            Great Buildings
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tab-gbg"
            type="button"
            role="tab"
          >
            GBG / GvG
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tab-webhooks"
            type="button"
            role="tab"
          >
            Webhooks
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            data-bs-toggle="tab"
            data-bs-target="#tab-general"
            type="button"
            role="tab"
          >
            General
          </button>
        </li>
      </ul>

      <!-- Tab content -->
      <div class="tab-content">
        <!-- Panels tab -->
        <div class="tab-pane fade show active" id="tab-panels" role="tabpanel">
          <div class="card">
            <h6 class="card-header">City Info</h6>
            <div class="card-body">
              <label
                >Show Your City Stats <input type="checkbox" id="Stats"
              /></label>
              <label
                >Show Current Bonus/Boosts <input type="checkbox" id="bonus"
              /></label>
              <label
                >Show City Incidents <input type="checkbox" id="Incidents"
              /></label>
              <label
                >Show Building Collection Times
                <input type="checkbox" id="collectionTimes"
              /></label>
              <label
                >Show Other Player Stats <input type="checkbox" id="visit"
              /></label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Players on Game Launch</h6>
            <div class="card-body">
              <label>Show Friends <input type="checkbox" id="Friends" /></label>
              <label>Show Guild <input type="checkbox" id="Guild" /></label>
              <label>Show Hood <input type="checkbox" id="Hood" /></label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Guild Expedition</h6>
            <div class="card-body">
              <label
                >Show Member Contribution
                <input type="checkbox" id="Expedition"
              /></label>
              <label
                >Show Rewards <input type="checkbox" id="GErewards"
              /></label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Other Info</h6>
            <div class="card-body">
              <label
                >Show Cultural Settlement
                <input type="checkbox" id="settlement"
              /></label>
              <label>Show Rewards <input type="checkbox" id="rewards" /></label>
              <label
                >Show Goods Inventory <input type="checkbox" id="goods"
              /></label>
            </div>
          </div>
        </div>

        <!-- Great Buildings tab -->
        <div class="tab-pane fade" id="tab-gb" role="tabpanel">
          <div class="card">
            <h6 class="card-header">GB Info</h6>
            <div class="card-body">
              <label
                >Show GB Donation Helper <input type="checkbox" id="Donation"
              /></label>
              <label
                >Prefix with Guild #
                <input type="checkbox" id="donationGuildPosition"
              /></label>
              <label
                >Suffix with this text
                <input
                  type="text"
                  class="form-control"
                  id="donationSuffix"
                  value=""
                  size="20"
                />
              </label>
              <label
                >Hide Unsafe Spots <input type="checkbox" id="hideUnsafe"
              /></label>
              <label
                >Donation %
                <input
                  class="form-control"
                  type="number"
                  id="donationPercent"
                  value="190"
                  min="0"
                  max="200"
                />
              </label>
              <label
                >Show GB Rewards <input type="checkbox" id="GBRewards"
              /></label>
              <label
                >Show Current Donors <input type="checkbox" id="GBDonors"
              /></label>
              <label
                >Show Total FP Invested <input type="checkbox" id="Invested"
              /></label>
              <label
                >Show Current Level <input type="checkbox" id="GBInfo"
              /></label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Guild Admin</h6>
            <div class="card-body">
              <label
                >Show Treasury <input type="checkbox" id="Treasury"
              /></label>
              <label
                >Show Treasury Contributions
                <input type="checkbox" id="contributions"
              /></label>
              <label
                >Show Treasury Logs <input type="checkbox" id="logs"
              /></label>
            </div>
          </div>
        </div>

        <!-- GBG / GvG tab -->
        <div class="tab-pane fade" id="tab-gbg" role="tabpanel">
          <div class="card">
            <h6 class="card-header">GvG</h6>
            <div class="card-body">
              <label
                >Show GvG Age Status <input type="checkbox" id="GvG"
              /></label>
              <label>Show Army Stats <input type="checkbox" id="army" /></label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Guild Battlegrounds</h6>
            <div class="card-body">
              <label
                >Show Member Activity <input type="checkbox" id="Battleground"
              /></label>
              <label
                >Show Leaderboard <input type="checkbox" id="leaderboard"
              /></label>
              <label
                >Show Building Costs <input type="checkbox" id="buildingCosts"
              /></label>
              <label
                >Show Rewards <input type="checkbox" id="GBGrewards"
              /></label>
              <label
                >Show # Siege Camps <input type="checkbox" id="GBGshowSC"
              /></label>
              <label
                >Show Province Opening Time
                <input type="checkbox" id="GBGprovinceTime"
              /></label>
              <label
                >Add text to target generator
                <input
                  type="text"
                  class="form-control"
                  id="targetText"
                  value=""
                  size="40"
                />
              </label>
              <label
                >Search message topics for targets
                <input
                  type="text"
                  class="form-control"
                  id="targets"
                  value="targets"
                  size="40"
                />
              </label>
            </div>
          </div>
        </div>

        <!-- Webhooks tab -->
        <div class="tab-pane fade" id="tab-webhooks" role="tabpanel">
          <div class="card">
            <h6 class="card-header">Discord Webhooks</h6>
            <div class="card-body">
              <label
                >GBG Targets
                <input
                  type="url"
                  class="form-control"
                  id="discordTargetURL"
                  value=""
                  size="40"
                  pattern="https?://.+"
                />
              </label>
              <label
                >GBG Monitor Alerts
                <input
                  type="url"
                  class="form-control"
                  id="discordGBGURL"
                  value=""
                  size="40"
                  pattern="https?://.+"
                />
              </label>
              <label
                >Auto-Scan Snipe Alerts
                <input
                  type="url"
                  class="form-control"
                  id="discordScanAlertURL"
                  value=""
                  size="40"
                  pattern="https?://.+"
                />
              </label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Auto-Scan Settings</h6>
            <div class="card-body">
              <label
                >ROI Alert Threshold (%)
                <input
                  class="form-control"
                  type="number"
                  id="scanAlertROI"
                  value="500"
                  min="0"
                  max="99999"
                />
              </label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Google Sheets</h6>
            <div class="card-body">
              <label
                >Guild Info URL
                <input
                  type="url"
                  class="form-control"
                  id="sheetGuildURL"
                  value=""
                  size="40"
                  pattern="https?://.+"
                />
              </label>
            </div>
          </div>
        </div>

        <!-- General tab -->
        <div class="tab-pane fade" id="tab-general" role="tabpanel">
          <div class="card">
            <h6 class="card-header">Display</h6>
            <div class="card-body">
              <label
                >Minimum panel height
                <input
                  class="form-control"
                  type="number"
                  id="minSize"
                  value="50"
                />
              </label>
            </div>
          </div>
          <div class="card">
            <h6 class="card-header">Language</h6>
            <div class="card-body">
              <label for="language"
                >Language
                <select class="form-control" id="language" name="language">
                  <option value="auto">Use Browser Language</option>
                  <option value="en">English</option>
                  <option value="nl">Dutch</option>
                  <option value="fi">Finnish</option>
                  <option value="fr">French</option>
                  <option value="de">German</option>
                  <option value="el">Greek</option>
                  <option value="it">Italian</option>
                  <option value="es">Spanish</option>
                  <option value="sv">Swedish</option>
                  <option value="game">Use Game Language</option>
                </select>
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
